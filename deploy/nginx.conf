# Prisma mini app — nginx konfiguratsiyasi (HTTPS)
# Joylashuvi: /etc/nginx/sites-available/prisma
# DIQQAT: faqat shu sayt — serverdagi boshqa saytlarga tegmaydi.

server {
    listen 80;
    server_name prisma.157.180.46.214.sslip.io;

    # Let's Encrypt sertifikat yangilanishi uchun
    location /.well-known/acme-challenge/ {
        root /var/www/prisma/webapp/dist;
    }

    # Qolgan barcha so'rovlar HTTPS ga
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name prisma.157.180.46.214.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/prisma.157.180.46.214.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prisma.157.180.46.214.sslip.io/privkey.pem;

    # Mini app statik fayllari (React build natijasi)
    root /var/www/prisma/webapp/dist;
    index index.html;

    # Backend API (faqat shu server uchun, 8001-port)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # index.html keshlanmasin — yangilanishlar darhol ko'rinsin
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA — barcha yo'llar index.html ga
    location / {
        try_files $uri $uri/ /index.html;
    }
}
